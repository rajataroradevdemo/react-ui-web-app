version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm ci --legacy-peer-deps

  build:
    commands:
      - echo Building the React UI Web app...
      - NODE_OPTIONS="--openssl-legacy-provider" npm run build
      - ls
      - pwd

artifacts:
  files:
    - '**/*'
  base-directory: build
  discart-paths: no
