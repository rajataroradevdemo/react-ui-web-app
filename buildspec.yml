version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm cli --legacy-peer-deps

  build:
    commands:
      - echo Building the React UI Web app...
      - npm run build

artifacts:
  files:
    - '**/*'
  base-directory: dist
  discart-paths: no
